<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Citi Mobile | Lock Card</title>
    <style>
      :root {
        --app-max: 400px;
        --s1: 8px;
        --s2: 16px;
        --s3: 24px;
        --s4: 32px;
        --s5: 40px;
        --s6: 48px;
        --radius-lg: 24px;
        --radius-md: 16px;
        --radius-sm: 12px;
        --shadow: 0 20px 60px rgba(2, 6, 23, 0.22);
        --shadow-sm: 0 12px 28px rgba(2, 6, 23, 0.14);
        --text: #0f172a;
        --muted: rgba(15, 23, 42, 0.72);
        --muted-2: rgba(15, 23, 42, 0.56);
        --line: rgba(15, 23, 42, 0.08);
        --bg: #f3f5fb;
        --card: #ffffff;
        --blue-1: #0b5ed7;
        --blue-2: #0a46b6;
        --blue-3: #072f8a;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        color: var(--text);
        background: radial-gradient(1200px 800px at 10% 10%, rgba(11, 94, 215, 0.16), transparent 60%),
          radial-gradient(900px 700px at 90% 20%, rgba(15, 23, 42, 0.14), transparent 55%),
          linear-gradient(180deg, #eef2ff 0%, #f8fafc 60%, #f1f5f9 100%);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .shell {
        min-height: 100vh;
        display: flex;
        align-items: stretch;
        justify-content: center;
        padding: 0;
      }

      .device {
        width: 100%;
        max-width: 100%;
        min-height: 100vh;
        border-radius: 0;
        overflow: hidden;
        box-shadow: none;
        border: 0;
        background: var(--bg);
        position: relative;
      }

      .header {
        background: radial-gradient(140% 120% at 20% 20%, rgba(255, 255, 255, 0.22) 0%, rgba(255, 255, 255, 0) 45%),
          linear-gradient(180deg, var(--blue-1) 0%, var(--blue-2) 50%, var(--blue-3) 100%);
        color: #ffffff;
        padding-bottom: var(--s2);
      }

      .statusbar {
        position: relative;
        z-index: 11;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: var(--s3) var(--s3) var(--s1);
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: rgba(255, 255, 255, 0.92);
      }

      .statusbar__icons {
        display: flex;
        align-items: center;
        gap: var(--s1);
      }

      .sb-signal {
        display: flex;
        align-items: flex-end;
        gap: 2px;
        width: 18px;
        height: 12px;
        opacity: 0.95;
      }

      .sb-signal span {
        display: block;
        flex: 1;
        border-radius: 2px;
        background: rgba(255, 255, 255, 0.92);
      }

      .sb-signal span:nth-child(1) {
        height: 4px;
        opacity: 0.6;
      }

      .sb-signal span:nth-child(2) {
        height: 6px;
        opacity: 0.72;
      }

      .sb-signal span:nth-child(3) {
        height: 9px;
        opacity: 0.84;
      }

      .sb-signal span:nth-child(4) {
        height: 12px;
      }

      .sb-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 24px;
        padding: 0 var(--s1);
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.32);
        background: rgba(255, 255, 255, 0.12);
        font-size: 11px;
      }

      .sb-battery {
        width: 26px;
        height: 12px;
        border-radius: 4px;
        border: 1.5px solid rgba(255, 255, 255, 0.85);
        position: relative;
      }

      .sb-battery::after {
        content: "";
        position: absolute;
        right: -3px;
        top: 3px;
        width: 2px;
        height: 6px;
        border-radius: 2px;
        background: rgba(255, 255, 255, 0.85);
      }

      .sb-battery span {
        position: absolute;
        left: 2px;
        top: 2px;
        bottom: 2px;
        width: 62%;
        border-radius: 3px;
        background: rgba(255, 255, 255, 0.92);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--s2);
        padding: 0 var(--s3) var(--s2);
      }

      .topbar__title {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: -0.01em;
      }

      .icon-btn {
        width: 36px;
        height: 36px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        background: rgba(255, 255, 255, 0.14);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: rgba(255, 255, 255, 0.92);
        flex: none;
      }

      .icon-btn svg {
        width: 18px;
        height: 18px;
      }

      .main {
        display: flex;
        flex-direction: column;
        gap: var(--s3);
        padding: var(--s3) var(--s3) var(--s6);
      }

      .card {
        background: var(--card);
        border: 1px solid rgba(15, 23, 42, 0.06);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-sm);
        overflow: hidden;
      }

      .card__pad {
        padding: var(--s3);
      }

      .card-title {
        margin: 0 0 var(--s2);
        font-size: 16px;
        font-weight: 700;
        letter-spacing: -0.01em;
      }

      .lock-state {
        position: absolute;
        left: -9999px;
      }

      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--s2);
      }

      .toggle-copy {
        min-width: 0;
      }

      .toggle-title {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: -0.01em;
      }

      .toggle-desc {
        margin-top: var(--s1);
        font-size: 12px;
        font-weight: 600;
        color: var(--muted);
      }

      .switch {
        flex: none;
        width: 56px;
        height: 32px;
        border-radius: 999px;
        border: 1px solid rgba(15, 23, 42, 0.12);
        background: rgba(15, 23, 42, 0.18);
        position: relative;
        display: inline-flex;
        align-items: center;
        padding: 4px;
      }

      .switch__knob {
        width: 24px;
        height: 24px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.98);
        box-shadow: 0 10px 20px rgba(2, 6, 23, 0.16);
        transform: translateX(0);
        transition: transform 180ms ease;
      }

      .lock-state:checked ~ .main .switch {
        background: rgba(11, 94, 215, 0.62);
        border-color: rgba(11, 94, 215, 0.26);
      }

      .lock-state:checked ~ .main .switch__knob {
        transform: translateX(24px);
      }

      .state-pill {
        margin-top: var(--s2);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: var(--s1) var(--s2);
        border-radius: 999px;
        border: 1px solid rgba(15, 23, 42, 0.12);
        background: rgba(255, 255, 255, 0.92);
        font-size: 12px;
        font-weight: 700;
        color: rgba(15, 23, 42, 0.76);
      }

      .state-pill__on {
        display: none;
      }

      .lock-state:checked ~ .main .state-pill__on {
        display: inline;
      }

      .lock-state:checked ~ .main .state-pill__off {
        display: none;
      }

      .bank-card {
        margin-top: var(--s2);
        border-radius: var(--radius-lg);
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.22);
        background: radial-gradient(120% 140% at 20% 20%, rgba(255, 255, 255, 0.26) 0%, rgba(255, 255, 255, 0) 45%),
          linear-gradient(135deg, rgba(11, 94, 215, 0.96) 0%, rgba(10, 70, 182, 0.98) 55%, rgba(7, 47, 138, 0.98) 100%);
        color: rgba(255, 255, 255, 0.96);
        box-shadow: 0 22px 48px rgba(2, 6, 23, 0.22);
        padding: var(--s3);
        position: relative;
      }

      .bank-card__brand {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--s2);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .bank-card__mask {
        margin-top: var(--s4);
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.18em;
      }

      .bank-card__meta {
        margin-top: var(--s2);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--s2);
      }

      .bank-card__name {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        opacity: 0.92;
      }

      .bank-card__type {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        opacity: 0.85;
      }

      .card-lock {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        gap: var(--s2);
        background: rgba(2, 6, 23, 0.46);
        backdrop-filter: blur(2px);
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .card-lock svg {
        width: 20px;
        height: 20px;
      }

      .lock-state:checked ~ .main .card-lock {
        display: flex;
      }

      .nav {
        position: sticky;
        bottom: 0;
        z-index: 12;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
        border-top: 1px solid rgba(15, 23, 42, 0.08);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: var(--s2) var(--s2) calc(var(--s2) + env(safe-area-inset-bottom));
      }

      .nav__item {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        font-size: 11px;
        font-weight: 700;
        color: rgba(15, 23, 42, 0.55);
      }

      .nav__item svg {
        width: 22px;
        height: 22px;
      }

      .nav__item.is-active {
        color: rgba(11, 94, 215, 0.98);
      }

      @media (min-width: 560px) {
        .shell {
          align-items: center;
          padding: var(--s4);
        }

        .device {
          max-width: var(--app-max);
          min-height: auto;
          border-radius: 40px;
          box-shadow: var(--shadow);
          border: 1px solid rgba(255, 255, 255, 0.6);
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="device">
        <input class="lock-state" type="checkbox" id="lockState" />

        <header class="header">
          <div class="topbar">
            <a class="icon-btn" href="blank.html" aria-label="Back to accounts">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M15 18l-6-6 6-6"
                  stroke="currentColor"
                  stroke-width="2.4"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </a>
            <h1 class="topbar__title">Lock Card</h1>
            <a class="icon-btn" href="profile.html" aria-label="Profile">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M12 12a4.2 4.2 0 1 0-4.2-4.2A4.2 4.2 0 0 0 12 12Zm0 2.2c-4.3 0-7.8 2.1-7.8 4.8 0 1 1 1.8 2.3 1.8h11c1.3 0 2.3-.8 2.3-1.8 0-2.7-3.5-4.8-7.8-4.8Z"
                  fill="currentColor"
                  opacity="0.95"
                />
              </svg>
            </a>
          </div>
        </header>

        <main class="main">
          <section class="card" aria-label="Lock card toggle">
            <div class="card__pad">
              <h2 class="card-title">Card Status</h2>
              <div class="toggle-row">
                <div class="toggle-copy">
                  <div class="toggle-title">Lock this card</div>
                  <div class="toggle-desc">Prevents new purchases and cash withdrawals</div>
                </div>
                <label class="switch" for="lockState" aria-label="Toggle lock">
                  <span class="switch__knob" aria-hidden="true"></span>
                </label>
              </div>

              <div class="state-pill" aria-label="Current state">
                <span class="state-pill__off">Unlocked</span>
                <span class="state-pill__on">Locked</span>
              </div>

              <div class="bank-card" aria-label="Card preview">
                <div class="bank-card__brand">
                  <span>Citi</span>
                  <span>VISA</span>
                </div>
                <div class="bank-card__mask">•••• •••• •••• 5271</div>
                <div class="bank-card__meta">
                  <div class="bank-card__name">CORNELIS VAN KAAM</div>
                  <div class="bank-card__type">DEBIT</div>
                </div>
                <div class="card-lock" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none">
                    <path
                      d="M17 10V8.2a5 5 0 1 0-10 0V10"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                    <path
                      d="M7.4 10H16.6c1 0 1.8.8 1.8 1.8v6c0 1-.8 1.8-1.8 1.8H7.4c-1 0-1.8-.8-1.8-1.8v-6c0-1 .8-1.8 1.8-1.8Z"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linejoin="round"
                    />
                  </svg>
                  Locked
                </div>
              </div>
            </div>
          </section>
        </main>

        <nav class="nav" aria-label="Bottom navigation">
          <a class="nav__item is-active" href="blank.html">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M7 4h10c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H7c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2Z"
                stroke="currentColor"
                stroke-width="2"
              />
              <path d="M8 9h8" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.9" />
              <path d="M8 13h6" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.7" />
            </svg>
            <span>Accounts</span>
          </a>
          <a class="nav__item" href="payments.html">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M20 7.2v9.6c0 1.2-1 2.2-2.2 2.2H6.2C5 19 4 18 4 16.8V7.2C4 6 5 5 6.2 5h11.6C19 5 20 6 20 7.2Z"
                stroke="currentColor"
                stroke-width="2"
              />
              <path d="M7 12h10" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.85" />
            </svg>
            <span>Payments</span>
          </a>
          <a class="nav__item" href="services.html">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M12 17.3l-1.9 1c-.6.3-1.3-.2-1.2-.9l.4-2.1-1.5-1.5c-.5-.5-.2-1.3.5-1.4l2.1-.3.9-1.9c.3-.6 1.2-.6 1.5 0l.9 1.9 2.1.3c.7.1 1 .9.5 1.4l-1.5 1.5.4 2.1c.1.7-.6 1.2-1.2.9l-1.9-1Z"
                stroke="currentColor"
                stroke-width="2"
                stroke-linejoin="round"
              />
              <path d="M6 21h12" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.6" />
            </svg>
            <span>Services</span>
          </a>
          <a class="nav__item" href="profile.html">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M12 12a4.2 4.2 0 1 0-4.2-4.2A4.2 4.2 0 0 0 12 12Zm0 2.2c-4.3 0-7.8 2.1-7.8 4.8 0 1 1 1.8 2.3 1.8h11c1.3 0 2.3-.8 2.3-1.8 0-2.7-3.5-4.8-7.8-4.8Z"
                fill="currentColor"
                opacity="0.9"
              />
            </svg>
            <span>Profile</span>
          </a>
        </nav>
      </div>
    </div>
  </body>
</html>
